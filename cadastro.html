<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Criar Conta — Hub NFe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f4a87 0%, #1a6fc4 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      padding: 2.5rem 2.2rem;
      width: 100%; max-width: 440px;
    }
    .brand-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .brand-logo i { font-size: 2.4rem; color: #1a6fc4; }
    .brand-logo h1 { font-size: 1.3rem; font-weight: 700; color: #0f4a87; margin: .3rem 0 .1rem; }
    .brand-logo p { font-size: .83rem; color: #6c757d; margin: 0; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-logo">
      <i class="bi bi-person-plus-fill"></i>
      <h1>Criar Conta</h1>
      <p>Hub NFe — Central de XML Fiscal</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('cadastro') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Nome completo</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="nome" class="form-control" placeholder="Seu nome" required autofocus
                 value="{{ request.form.get('nome', '') }}">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">E-mail</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="seu@email.com" required
                 value="{{ request.form.get('email', '') }}">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Senha <span class="text-muted fw-normal">(mín. 6 caracteres)</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="senha" class="form-control" placeholder="••••••" required minlength="6">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Confirmar senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="senha2" class="form-control" placeholder="••••••" required minlength="6">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-check-circle me-1"></i> Criar conta
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center small text-muted mb-0">
      Já tem conta?
      <a href="{{ url_for('login') }}" class="fw-semibold">Fazer login</a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
