<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Hub NFe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f4a87 0%, #1a6fc4 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      padding: 2.5rem 2.2rem;
      width: 100%; max-width: 420px;
    }
    .brand-logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .brand-logo i { font-size: 2.8rem; color: #1a6fc4; }
    .brand-logo h1 { font-size: 1.5rem; font-weight: 700; color: #0f4a87; margin: .3rem 0 .1rem; }
    .brand-logo p { font-size: .83rem; color: #6c757d; margin: 0; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-logo">
      <i class="bi bi-file-earmark-zip-fill"></i>
      <h1>Hub NFe</h1>
      <p>Central de XML Fiscal</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold small">E-mail</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="senha" class="form-control" placeholder="••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center small text-muted mb-0">
      Não tem conta?
      <a href="{{ url_for('cadastro') }}" class="fw-semibold">Criar conta</a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
