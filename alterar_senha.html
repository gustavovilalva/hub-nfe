{% extends "base.html" %}
{% block title %}Alterar Senha — Hub NFe{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="bi bi-key me-2 text-primary"></i>Alterar Senha</h1>
</div>

<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="table-card p-4">

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('alterar_senha') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Senha atual</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="senha_atual" class="form-control" required autofocus placeholder="••••••">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Nova senha <span class="text-muted fw-normal">(mín. 6 caracteres)</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="nova_senha" class="form-control" required minlength="6" placeholder="••••••">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Confirmar nova senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="confirma" class="form-control" required minlength="6" placeholder="••••••">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1">
            <i class="bi bi-check-circle me-1"></i> Salvar nova senha
          </button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>

    </div>
  </div>
</div>
{% endblock %}
